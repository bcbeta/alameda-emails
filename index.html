<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alameda Lane Repurposing — CORA Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ef;--card:#fff;--accent:#b45309;--accent-light:#fef3c7;--accent-dark:#92400e;--text:#1c1917;--text-muted:#78716c;--border:#e7e5e4;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:#1c1917;color:#fafaf9;padding:2rem 0;border-bottom:4px solid var(--accent)}.header-inner{max-width:1100px;margin:0 auto;padding:0 1.5rem}.header h1{font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:400;letter-spacing:-.02em}

/* STICKY TOP BAR */
.sticky-bar{position:sticky;top:0;background:var(--bg);z-index:100;padding-top:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);box-shadow:0 4px 12px -4px rgba(0,0,0,.08)}

/* MONTH NAV */
.month-nav{max-width:1100px;margin:.75rem auto 0;padding:0 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap}
.month-nav a{padding:.3rem .7rem;border-radius:6px;font-size:.78rem;font-weight:600;text-decoration:none;color:var(--accent);background:var(--accent-light);border:1px solid transparent;transition:all .15s}
.month-nav a:hover{background:var(--accent);color:#fff}

.controls{max-width:1100px;margin:0 auto;padding:0 1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;position:relative}.search-box input{width:100%;padding:.65rem 1rem .65rem 2.5rem;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;background:var(--card);box-shadow:var(--shadow)}.search-box input:focus{outline:none;border-color:var(--accent)}.search-box svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.sender-select{padding:.65rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;background:var(--card);box-shadow:var(--shadow);min-width:180px;cursor:pointer}.sender-select:focus{outline:none;border-color:var(--accent)}

/* PILL SLIDER */
.pill-toggle{position:relative;display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);cursor:pointer;user-select:none;height:36px;width:210px;flex-shrink:0;overflow:hidden;transition:border-color .2s}.pill-toggle input{display:none}.pill-track{display:flex;width:100%;height:100%;position:relative;z-index:2}.pill-label{flex:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--text-muted);transition:color .2s ease;text-transform:uppercase;letter-spacing:.04em}.pill-thumb{position:absolute;top:2px;bottom:2px;left:2px;width:calc(50% - 2px);background:var(--accent-light);border-radius:16px;transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:1;border:1px solid var(--accent)}.pill-toggle input:checked ~ .pill-thumb{transform:translateX(0)}.pill-toggle input:checked ~ .pill-track .lbl-high{color:var(--accent-dark)}.pill-toggle input:not(:checked) ~ .pill-thumb{transform:translateX(100%);background:#e7e5e4;border-color:#d6d3d1}.pill-toggle input:not(:checked) ~ .pill-track .lbl-all{color:var(--text)}.pill-toggle:hover{border-color:var(--accent)}

.stats{font-size:.8rem;color:var(--text-muted);padding:.5rem 0;width:100%}.stats span{font-weight:600;color:var(--accent)}
.email-list{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem;margin-top:1rem;}.month-group{margin-bottom:1.5rem}.month-label{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--accent);padding:.5rem 0;border-bottom:2px solid var(--accent);margin-bottom:.75rem;position:relative;background:var(--bg);z-index:1;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;scroll-margin-top:180px}.month-label:hover{color:var(--accent-dark)}.month-label .chevron{transition:transform .2s;font-size:.8rem}.month-group.collapsed .month-label .chevron{transform:rotate(-90deg)}.month-group.collapsed .email-card{display:none}
.email-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:.5rem;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s;cursor:pointer}.email-card:hover{box-shadow:var(--shadow-lg);border-color:var(--accent)}.email-card.expanded{border-color:var(--accent)}.email-card.highlighted-card{border-left:4px solid var(--accent);background:linear-gradient(90deg,#fffbeb 0%,#fff 8%)}
.email-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}.email-subject{font-weight:600;font-size:.92rem;color:var(--text);flex:1}.email-badges{display:flex;gap:.4rem;align-items:center;flex-shrink:0}.badge-star{color:var(--accent);font-size:1rem}.badge-attach{color:var(--text-muted);font-size:.85rem}.email-date{font-size:.78rem;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.email-meta{display:flex;gap:.5rem;margin-top:.4rem;flex-wrap:wrap;align-items:center}.email-sender{font-size:.8rem;font-weight:500;color:var(--accent);background:var(--accent-light);padding:.15rem .5rem;border-radius:4px}.email-recipients{font-size:.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px}
.email-detail{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);font-size:.85rem}.email-card.expanded .email-detail{display:block}.email-detail .field{margin-bottom:.4rem}.email-detail .label{font-weight:600;color:var(--text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
.email-body{margin-top:.75rem;padding:1rem;background:#fafaf9;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.84rem;line-height:1.65;white-space:pre-wrap;word-wrap:break-word;max-height:600px;overflow-y:auto}
.email-links{margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap}.btn-link{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .75rem;border-radius:6px;font-size:.78rem;font-weight:600;text-decoration:none;transition:background .15s}.btn-pdf{background:#1c1917;color:#fafaf9}.btn-pdf:hover{background:#44403c}
.attach-list{margin-top:.75rem}.attach-title{font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem}.attach-item{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .65rem;margin:.2rem;border-radius:6px;font-size:.78rem;font-weight:500;text-decoration:none;background:var(--accent);color:#fff;transition:background .15s}.attach-item:hover{background:var(--accent-dark)}
.email-preview { font-size: .75rem; color: #a8a29e; font-weight: 400; margin-top: .5rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }.email-card.expanded .email-preview { display: none; }

.screenshots
