<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Document — CORA Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --card: #fff;
            --accent: #b45309;
            --accent-light: #fef3c7;
            --accent-dark: #92400e;
            --text: #1c1917;
            --text-muted: #78716c;
            --border: #e7e5e4;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.5; 
        }

        .top-nav { 
            max-width: 900px; 
            margin: 2rem auto 1rem; 
            padding: 0 1.5rem; 
        }

        .back-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.5rem; 
            text-decoration: none; 
            font-weight: 600; 
            color: var(--accent); 
            padding: 0.5rem 1rem; 
            background: rgba(255,255,255,0.5); 
            border-radius: 8px; 
            transition: background 0.2s; 
        }

        .back-btn:hover { background: var(--card); }

        .email-paper { 
            max-width: 900px; 
            margin: 0 auto 3rem; 
            background: var(--card); 
            padding: 3rem 4rem; 
            border-radius: 12px; 
            box-shadow: var(--shadow-lg); 
            border: 1px solid var(--border); 
        }

        .e-subj { 
            font-family: 'DM Serif Display', serif; 
            font-size: 2.2rem; 
            color: var(--text); 
            margin-bottom: 2rem; 
            line-height: 1.2; 
            word-wrap: break-word; 
        }

        .e-meta { 
            background: #fafaf9; 
            padding: 1.5rem 2rem; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin-bottom: 2.5rem; 
        }

        .e-meta div { 
            margin-bottom: 0.6rem; 
            font-size: 0.95rem; 
            word-wrap: break-word; 
        }

        .e-meta div:last-child { margin-bottom: 0; }

        .e-meta span { 
            font-weight: 700; 
            color: var(--text-muted); 
            display: inline-block; 
            width: 65px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            font-size: 0.75rem; 
        }

        /* High line-height (1.8) and pre-wrap for perfect .msg paragraph formatting */
        .e-body { 
            font-size: 1.05rem; 
            line-height: 1.8; 
            color: var(--text); 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: inherit; 
        }

        .e-att { 
            margin-top: 3.5rem; 
            padding-top: 2.5rem; 
            border-top: 2px dashed var(--border); 
        }

        .e-att-title { 
            font-family: 'DM Serif Display', serif; 
            font-size: 1.4rem; 
            color: var(--text); 
            margin-bottom: 1.5rem; 
        }

        .attach-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.75rem; 
        }

        .attach-item { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.4rem; 
            padding: 0.5rem 1rem; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            font-weight: 600; 
            text-decoration: none; 
            background: var(--accent); 
            color: #fff; 
            transition: background 0.15s; 
        }

        .attach-item:hover { background: var(--accent-dark); }
        
        .pdf-item { background: #1c1917; }
        .pdf-item:hover { background: #44403c; }

        .loading { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 1.1rem; }
        .error { text-align: center; padding: 2rem; color: #dc2626; font-weight: 600; background: #fee2e2; border-radius: 8px; margin-top: 2rem; border: 1px solid #fecaca; }
        .error-hint { font-size: 0.85rem; font-weight: 400; color: #991b1b; margin-top: 1rem; line-height: 1.4; }

        @media(max-width: 640px) {
            .email-paper { padding: 2rem 1.5rem; }
            .e-subj { font-size: 1.8rem; }
            .e-meta { padding: 1.25rem; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html" class="back-btn">← Back to Complete Archive</a>
</div>

<div class="email-paper" id="emailContainer">
    <div class="loading">Loading email document...</div>
</div>

<script>
    /**
     * Helper to escape HTML to prevent injection while keeping raw text safe
     */
    function escapeHtml(s) {
        if (!s) return "";
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    /**
     * Returns an emoji based on file extension
     */
    function fileIcon(n) {
        n = n.toLowerCase();
        if (n.endsWith('.pdf')) return '📄';
        if (/\.(png|jpg|jpeg|gif)$/.test(n)) return '🖼️';
        if (/\.(xlsx?|csv)$/.test(n)) return '📊';
        if (/\.docx?$/.test(n)) return '📝';
        if (n.endsWith('.msg')) return '✉️';
        if (/\.html?$/.test(n)) return '🌐';
        return '📎';
    }

    function renderSingleEmail() {
        const container = document.getElementById('emailContainer');
        
        // Safety check for URL parameters
        let fileQuery = '';
        try {
            const urlParams = new URLSearchParams(window.location.search);
            fileQuery = urlParams.get('f');
        } catch (e) {
            container.innerHTML = '<div class="error">URL Error<div class="error-hint">The link contains invalid characters. Please go back to the index and try again.</div></div>';
            return;
        }

        if (!fileQuery) {
            container.innerHTML = '<div class="error">No email specified.<div class="error-hint">Please return to the archive and select an email.</div></div>';
            return;
        }

        // Fetching the database as text first to sanitize
        fetch('alameda_emails.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP Error: ${r.status}. The file 'alameda_emails.json' might be missing.`);
                return r.text();
            })
            .then(text => {
                // SANITIZATION: Remove illegal control characters (0-31) that often sneak into .msg data.
                // Standard JSON parsers fail if these characters are literal (not escaped).
                const sanitized = text.replace(/[\x00-\x09\x0B-\x0C\x0E-\x1F\x7F]/g, "");
                
                let data;
                try {
                    data = JSON.parse(sanitized);
                } catch (e) {
                    throw new Error("JSON Parsing Failed. The 5.4MB file contains invalid characters that couldn't be automatically cleaned.");
                }

                const e = data.find(item => item.f === fileQuery);
                if (!e) {
                    container.innerHTML = '<div class="error">Email not found in database.<div class="error-hint">We loaded the data, but couldn\'t find a record for: <b>' + escapeHtml(fileQuery) + '</b></div></div>';
                    return;
                }
                
                // Build content
                let html = `<h1 class="e-subj">${escapeHtml(e.s || '(No Subject)')}</h1>`;
                
                html += '<div class="e-meta">';
                html += `<div><span>From</span> ${escapeHtml(e.n)}${e.e ? ' &lt;' + escapeHtml(e.e) + '&gt;' : ''}</div>`;
                if(e.to) html += `<div><span>To</span> ${escapeHtml(e.to)}</div>`;
                if(e.cc) html += `<div><span>CC</span> ${escapeHtml(e.cc)}</div>`;
                html += `<div><span>Date</span> ${escapeHtml(e.d)}</div>`;
                html += '</div>';
                
                if(e.b) {
                    html += `<div class="e-body">${escapeHtml(e.b)}</div>`;
                }
                
                // Attachments
                html += '<div class="e-att">';
                html += '<div class="e-att-title">Source Files & Attachments</div>';
                html += '<div class="attach-list">';
                
                // Link to original PDF
                html += `<a class="attach-item pdf-item" href="Alameda%20CORA%20pdf%20files/relevant_email_pdfs/${encodeURIComponent(e.f)}" target="_blank">📄 View Original Email PDF</a>`;
                
                if(e.att && e.att.length) {
                    let folderName = e.f ? e.f.replace(/\.pdf$/i, '') : 'UnknownFolder';
                    if (folderName.length > 80) { 
                        folderName = folderName.substring(0, 80).trim(); 
                    }
                    
                    e.att.forEach(a => {
                        let fileName = a.n;
                        if (!/\.[a-zA-Z0-9]{2,4}$/i.test(fileName)) { fileName += '.pdf'; }
                        const attachPath = `Alameda%20CORA%20pdf%20files/Attachments/${encodeURIComponent(folderName)}/${encodeURIComponent(fileName)}`;
                        html += `<a class="attach-item" href="${attachPath}" target="_blank">${fileIcon(fileName)} ${escapeHtml(a.n)}</a>`;
                    });
                }
                
                html += '</div></div>';
                
                container.innerHTML = html;
                document.title = escapeHtml(e.s || 'Email') + ' - CORA Archive';
            })
            .catch(err => {
                console.error("Archive Load Error:", err);
                container.innerHTML = `
                    <div class="error">
                        Error loading email data.
                        <div class="error-hint">
                            <b>Technical Details:</b> ${err.message}<br><br>
                            If this error persists, it means the 5.4MB JSON file has a syntax error that the browser cannot bypass.
                        </div>
                    </div>`;
            });
    }

    // Run on load
    renderSingleEmail();
</script>

</body>
</html>
